---
# ===========================
# Debian / Ubuntu / Proxmox VE (all versions)
# ===========================

- name: "[Debian_CA_directory](ca://s?q=Debian_CA_directory)"
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates/custom
    state: directory
    mode: '0755'
  when: ansible_os_family == "Debian"

- name: "[Debian_install_root](ca://s?q=Debian_install_root_certificate)"
  ansible.builtin.copy:
    content: "{{ step_root_ca }}"
    dest: /usr/local/share/ca-certificates/custom/step-root.crt
    mode: '0644'
  when: ansible_os_family == "Debian"
  notify: update_ca_trust

- name: "[Debian_install_intermediate](ca://s?q=Debian_install_intermediate_certificate)"
  ansible.builtin.copy:
    content: "{{ step_intermediate_ca }}"
    dest: /usr/local/share/ca-certificates/custom/step-intermediate.crt
    mode: '0644'
  when: ansible_os_family == "Debian"
  notify: update_ca_trust


# ===========================
# RHEL / Rocky
# ===========================

- name: "[RHEL_CA_directory](ca://s?q=RHEL_CA_directory)"
  ansible.builtin.file:
    path: /etc/pki/ca-trust/source/anchors
    state: directory
    mode: '0755'
  when: ansible_os_family == "RedHat"

- name: "[RHEL_install_root](ca://s?q=RHEL_install_root_certificate)"
  ansible.builtin.copy:
    content: "{{ step_root_ca }}"
    dest: /etc/pki/ca-trust/source/anchors/step-root.crt
    mode: '0644'
  when: ansible_os_family == "RedHat"
  notify:
  - update_ca_trust_debian
  - update_ca_trust_redhat

- name: "[RHEL_install_intermediate](ca://s?q=RHEL_install_intermediate_certificate)"
  ansible.builtin.copy:
    content: "{{ step_intermediate_ca }}"
    dest: /etc/pki/ca-trust/source/anchors/step-intermediate.crt
    mode: '0644'
  when: ansible_os_family == "RedHat"
  notify:
  - update_ca_trust_debian
  - update_ca_trust_redhat

