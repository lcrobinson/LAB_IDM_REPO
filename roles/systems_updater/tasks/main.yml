---
# ===========================
# Package Updates
# ===========================

- name: Update RedHat-family packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
  when: ansible_os_family == "RedHat"
  register: dnf_result

- name: Update Debian-family packages (Debian + Proxmox)
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"
  register: apt_result


# ===========================
# Reboot Detection
# ===========================

# Debian/Ubuntu reboot-required file
- name: Check if a reboot is required (Debian only, not Proxmox)
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution != "Proxmox"
    - inventory_hostname not in (skip_reboot_hosts | default([]))


# Proxmox reboot detection (kernel or KVM module changes)
- name: Trigger reboot handler for Proxmox (kernel or KVM updates)
  ansible.builtin.assert:
    that: true
  changed_when: true
  notify: Reboot Server
  when:
    - ansible_distribution == "Proxmox"
    - apt_result.changed
    - "'linux-image' in apt_result.stdout or 'pve-kernel' in apt_result.stdout or 'kvm' in apt_result.stdout"
    - inventory_hostname not in (skip_reboot_hosts | default([]))


# RedHat reboot detection
- name: Trigger reboot handler for RedHat (if kernel updated)
  ansible.builtin.assert:
    that: true
  changed_when: true
  notify: Reboot Server
  when:
    - ansible_os_family == "RedHat"
    - dnf_result.changed
    - "'kernel' in dnf_result.results | string"
    - inventory_hostname not in (skip_reboot_hosts | default([]))


# Debian reboot detection (non-Proxmox)
- name: Trigger reboot handler for Debian (if file exists)
  ansible.builtin.assert:
    that: true
  changed_when: true
  notify: Reboot Server
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution != "Proxmox"
    - reboot_required_file.stat.exists is defined
    - reboot_required_file.stat.exists
    - inventory_hostname not in (skip_reboot_hosts | default([]))

