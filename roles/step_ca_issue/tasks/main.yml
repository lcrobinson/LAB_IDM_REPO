---
- name: "Issue certificate for {{ inventory_hostname }} (normal mode)"
  ansible.builtin.command: >
    /root/.acme.sh/acme.sh --issue
      -d {{ inventory_hostname }}
      --server {{ step_ca_url }}
      --home /root/.acme.sh
      --standalone
      --listen-v4
  register: acme_issue
  failed_when: false

# PATH 2 — Force re-issue when acme.sh skipped due to no domain change
- name: "Force re-issue if acme.sh skipped due to no domain change"
  ansible.builtin.command: >
    /root/.acme.sh/acme.sh --renew
      -d {{ inventory_hostname }}
      --server {{ step_ca_url }}
      --home /root/.acme.sh
      --standalone
      --listen-v4
      --force
  register: acme_issue_forced
  when: "'Domains not changed' in acme_issue.stdout"
  failed_when: false

# PATH 3 — Fail only if both attempts failed AND it wasn't a no-change skip
- name: "Fail if issuance failed completely"
  ansible.builtin.fail:
    msg: |
      acme.sh issuance failed.
      stdout: {{ acme_issue.stdout | default('') }}
      stderr: {{ acme_issue.stderr | default('') }}
  when:
    - acme_issue.rc != 0
    - "'Domains not changed' not in acme_issue.stdout"

# PATH 1 or 2 — Determine which result to use
- name: "Select final ACME result"
  ansible.builtin.set_fact:
    acme_final: "{{ acme_issue_forced if ('Domains not changed' in acme_issue.stdout) else acme_issue }}"

# Stage cert + key
- name: "Stage certificate"
  ansible.builtin.copy:
    src: "/root/.acme.sh/{{ inventory_hostname }}_ecc/{{ inventory_hostname }}.cer"
    dest: "{{ step_ca_cert_base_dir }}/{{ inventory_hostname }}.crt"
    remote_src: true

- name: "Stage key"
  ansible.builtin.copy:
    src: "/root/.acme.sh/{{ inventory_hostname }}_ecc/{{ inventory_hostname }}.key"
    dest: "{{ step_ca_cert_base_dir }}/{{ inventory_hostname }}.key"
    remote_src: true

- name: "Expose staged cert paths as facts"
  ansible.builtin.set_fact:
    staged_cert_fullchain: "{{ step_ca_cert_base_dir }}/{{ inventory_hostname }}.crt"
    staged_cert_key: "{{ step_ca_cert_base_dir }}/{{ inventory_hostname }}.key"
