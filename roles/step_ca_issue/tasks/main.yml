---
- name: "Ensure controller staging directory exists"
  delegate_to: localhost
  file:
    path: "{{ step_ca_cert_base_dir }}"
    state: directory
    mode: '0755'
  run_once: true

- name: "Issue or renew certificate for {{ inventory_hostname }} on controller"
  delegate_to: localhost
  become: true
  become_user: root
  acme_stage_cert:
    domain: "{{ inventory_hostname }}"
    acme_home: "{{ acme_home }}"
    cert_base_dir: "{{ step_ca_cert_base_dir }}"
    ca_url: "{{ step_ca_acme_directory }}"
    ca_bundle: "{{ acme_ca_bundle }}"
    naming_enforce: "{{ naming_enforce }}"
    inventory_hostname: "{{ inventory_hostname }}"
  register: acme_result
  failed_when: acme_result is failed

- name: "Expose staged cert paths as facts"
  set_fact:
    staged_cert_fullchain: "{{ acme_result.cert_path }}"
    staged_cert_key: "{{ acme_result.key_path }}"

