---
- name: "Skip if not an OPNsense host"
  meta: end_host
  when: "'firewalls' not in group_names"

- name: "Copy staged cert to OPNsense temporary location"
  copy:
    src: "{{ staged_cert_fullchain }}"
    dest: "/tmp/{{ inventory_hostname }}.crt"
    owner: root
    group: wheel
    mode: '0600'

- name: "Copy staged key to OPNsense temporary location"
  copy:
    src: "{{ staged_cert_key }}"
    dest: "/tmp/{{ inventory_hostname }}.key"
    owner: root
    group: wheel
    mode: '0600'

- name: "Move cert into OPNsense config-managed location"
  command: mv /tmp/{{ inventory_hostname }}.crt /var/etc/cert.pem && mv /tmp/{{ inventory_hostname }}.key /var/etc/key.pem
  become: true

- name: "Restart OPNsense web UI"
  command: configctl webgui restart
  become: true

- name: "Report status"
  debug:
    msg: "OPNsense TLS updated for {{ inventory_hostname }}"

