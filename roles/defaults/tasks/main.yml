---
- name: Update Arch Linux systems
  ansible.builtin.pacman:
    update_cache: true
    upgrade: true
  when: ansible_pkg_mgr == "pacman"
  tags:
    - always

- name: Update APT-based systems
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
  when: ansible_pkg_mgr == "apt"
  tags:
    - always

- name: Update DNF-based systems
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
    update_cache: true
  when: ansible_pkg_mgr == "dnf"
  tags:
    - always

- name: Skip Proxmox user configuration on non-Proxmox hosts
  ansible.builtin.meta: end_host
  when: not is_proxmox_node | bool

- name: Check whether pveum exists
  ansible.builtin.stat:
    path: /usr/sbin/pveum
  register: pveum_bin

- name: Stop if Proxmox tools are missing on a host marked as Proxmox
  ansible.builtin.assert:
    that:
      - pveum_bin.stat.exists
    fail_msg: "Host is marked as a Proxmox node, but /usr/sbin/pveum was not found."

- name: Set Proxmox user principal
  ansible.builtin.set_fact:
    proxmox_user_principal: "{{ admin_user }}@{{ proxmox_auth_realm }}"

- name: Get current Proxmox user list
  ansible.builtin.command:
    cmd: /usr/sbin/pveum user list
  register: pveum_user_list
  changed_when: false

- name: Ensure Proxmox PAM user exists
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum user add {{ proxmox_user_principal }}"
  when: proxmox_user_principal not in pveum_user_list.stdout
  register: pveum_user_add
  changed_when: pveum_user_add.rc == 0

- name: Get current Proxmox ACL list
  ansible.builtin.command:
    cmd: /usr/sbin/pveum acl list
  register: pveum_acl_list
  changed_when: false

- name: Ensure Proxmox ACL is assigned
  ansible.builtin.command:
    cmd: >-
      /usr/sbin/pveum aclmod {{ proxmox_acl_path }}
      -user {{ proxmox_user_principal }}
      -role {{ proxmox_role }}
  when: >
    proxmox_user_principal not in pveum_acl_list.stdout
    or proxmox_role not in pveum_acl_list.stdout
  register: pveum_acl_add
  changed_when: pveum_acl_add.rc == 0

- name: Set platform-specific admin variables
  ansible.builtin.set_fact:
    admin_group: >-
      {{
        'wheel' if ansible_system == 'FreeBSD'
        else ('wheel' if ansible_os_family == 'RedHat'
        else 'sudo')
      }}
    ssh_group: >-
      {{
        'wheel' if ansible_system == 'FreeBSD'
        else admin_user
      }}
    manage_sudoers: >-
      {{
        false if ansible_system == 'FreeBSD'
        else true
      }}

- name: Ensure admin group exists (Linux only)
  ansible.builtin.group:
    name: "{{ admin_group }}"
    state: present
  when: ansible_system != "FreeBSD"

- name: Ensure admin user exists
  ansible.builtin.user:
    name: nafuradmin
    shell: /bin/bash
    groups: "{{ admin_group }}"
    append: true
    create_home: true
    state: present

# Linux-only sudoers management
- name: Ensure sudoers drop-in for admin user (Linux only)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/nafuradmin"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
    content: |
      nafuradmin ALL=(ALL:ALL) NOPASSWD: ALL
  when: manage_sudoers
