---
- name: Skip NPM certificate staging if disabled
  ansible.builtin.meta: end_host
  when: not npm_cert_stage_enabled | bool

- name: Show staged certificate locations for NPM manual upload
  ansible.builtin.debug:
    msg:
      - "Certificate for {{ item.common_name }} staged at:"
      - "{{ step_ca_cert_base_dir }}/{{ item.cert_name }}/fullchain.pem"
      - "{{ step_ca_cert_base_dir }}/{{ item.cert_name }}/privkey.pem"
  loop: "{{ npm_certificates }}"
