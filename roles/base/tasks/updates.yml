---
- name: Update Arch Linux systems
  ansible.builtin.pacman:
    update_cache: true
    upgrade: true
  when: ansible_pkg_mgr == "pacman"
  tags:
    - always

- name: Update APT-based systems
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
  when: ansible_pkg_mgr == "apt"
  tags:
    - always

- name: Update DNF-based systems
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
    update_cache: true
  when: ansible_pkg_mgr == "dnf"
  tags:
    - always
